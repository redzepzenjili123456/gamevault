<!DOCTYPE html>
<html lang="mk">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>GameVault - Најава</title>
    <link rel="stylesheet" href="index.css">
</head>
<body>
    <div class="login-container">
        <div class="login-box">
            <h1>🎮 GameVault</h1>
            <p>Најави се за да играш</p>
            
            <div class="input-group">
                <label>📧 Е-пошта</label>
                <input type="email" id="email" placeholder="vasata@email.com">
            </div>
            
            <div class="input-group">
                <label>👤 Име</label>
                <input type="text" id="username" placeholder="Вашето име">
            </div>
            
            <button id="sendCodeBtn">📧 Испрати код</button>
            
            <div id="codeSection" style="display: none;">
                <div class="input-group">
                    <label>🔐 Код (4 цифри)</label>
                    <input type="text" id="code" maxlength="4" placeholder="0000">
                </div>
                <button id="verifyBtn">✅ Потврди</button>
            </div>
            
            <div id="message"></div>
        </div>
    </div>
    
    <script src="script.js"></script>
</body>
</html>
